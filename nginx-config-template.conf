# Sample Nginx Configuration for Fastpanel
# Location: /etc/nginx/sites-available/zeptac-backend
# 
# Copy this file to the server and customize:
# - Replace your-domain.com with your actual domain
# - Update certificate paths
# - Reload: sudo systemctl reload nginx

# Upstream backend server
upstream zeptac_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    
    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;
    
    # SSL Certificate Configuration
    # Option 1: Self-signed or Fastpanel auto-SSL
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;
    
    # Option 2: Let's Encrypt (if using certbot)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL Configuration - Security Best Practices
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Logging
    access_log /var/log/nginx/zeptac-backend-access.log combined;
    error_log /var/log/nginx/zeptac-backend-error.log warn;
    
    # Client body size limit (for uploads)
    client_max_body_size 50M;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1000;
    gzip_disable "msie6";
    
    # ========================================
    # Main API Proxy Configuration
    # ========================================
    location / {
        proxy_pass http://zeptac_backend;
        proxy_http_version 1.1;
        
        # WebSocket Support (for Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Request Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Keep-alive
        proxy_set_header Connection "";
        keepalive_timeout 65;
    }
    
    # ========================================
    # File Export Endpoint (Optimized)
    # ========================================
    location /api/export {
        proxy_pass http://zeptac_backend;
        proxy_http_version 1.1;
        
        # Standard Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # IMPORTANT: Longer timeout for file export operations
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Disable buffering for file downloads
        proxy_buffering off;
        
        # Allow large uploads/downloads
        client_max_body_size 100M;
    }
    
    # ========================================
    # WebSocket Endpoint (Optional explicit config)
    # ========================================
    location /socket.io {
        proxy_pass http://zeptac_backend/socket.io;
        proxy_http_version 1.1;
        
        # WebSocket Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Long timeouts for persistent connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        
        # Disable buffering
        proxy_buffering off;
    }
    
    # ========================================
    # Health Check Endpoint
    # ========================================
    location /health {
        access_log off;
        proxy_pass http://zeptac_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Short timeout for health checks
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }
    
    # ========================================
    # Deny access to sensitive files
    # ========================================
    location ~ /\. {
        deny all;
    }
    
    location ~ ~$ {
        deny all;
    }
}
